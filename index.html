<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Optimal Windows</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1b1d1c;
      --muted: #626a66;
      --line: #d9ddd5;
      --paper: #f7f6f0;
      --surface: #ffffff;
      --forest: #214f3c;
      --moss: #78904f;
      --clay: #b86948;
      --gold: #d3a642;
      --blue: #426a8d;
      --violet: #7a5a8c;
      --berry: #9a4f65;
      --shadow: 0 18px 55px rgba(31, 34, 29, .13);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .45), rgba(255, 255, 255, 0) 36%),
        var(--paper);
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: rgba(247, 246, 240, .88);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 4;
    }

    .bar {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      min-height: 74px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.55rem, 1.2rem + 1.3vw, 2.55rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .controls {
      display: flex;
      align-items: end;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    input[type="time"] {
      appearance: none;
      border: 1px solid #c8cec5;
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      min-height: 42px;
      padding: 0 12px;
      min-width: 132px;
      box-shadow: 0 1px 0 rgba(255, 255, 255, .7);
    }

    .toggle {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      border: 1px solid #c8cec5;
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      font-size: .92rem;
      font-weight: 720;
      text-transform: none;
      cursor: pointer;
      user-select: none;
    }

    .toggle input {
      width: 18px;
      height: 18px;
      accent-color: var(--forest);
      flex: 0 0 auto;
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 46px;
      display: grid;
      grid-template-columns: minmax(280px, 390px) 1fr;
      gap: 22px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .now-panel {
      position: sticky;
      top: 96px;
      overflow: hidden;
    }

    .state-band {
      min-height: 12px;
      background: var(--state-color, var(--forest));
    }

    .now-body {
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .eyebrow {
      margin: 0;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .state-name {
      margin: 0;
      font-size: clamp(2rem, 1.5rem + 2vw, 4rem);
      line-height: .95;
      letter-spacing: 0;
    }

    .current-work {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.45;
      color: #303531;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .metric {
      padding: 13px;
      min-height: 78px;
      display: grid;
      align-content: center;
      gap: 4px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .metric:nth-child(even) {
      border-right: 0;
    }

    .metric:nth-last-child(-n + 2) {
      border-bottom: 0;
    }

    .metric span {
      color: var(--muted);
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .metric strong {
      font-size: 1.02rem;
      overflow-wrap: anywhere;
    }

    .work-list {
      display: grid;
      gap: 10px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .work-list li {
      display: grid;
      grid-template-columns: 9px 1fr;
      gap: 10px;
      align-items: start;
      color: #303531;
      line-height: 1.35;
    }

    .work-list li::before {
      content: "";
      width: 9px;
      height: 9px;
      margin-top: .36em;
      border-radius: 50%;
      background: var(--state-color, var(--forest));
    }

    .window-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .window-card {
      border: 1px solid var(--line);
      border-left: 7px solid var(--window-color);
      border-radius: 8px;
      padding: 11px 12px;
      display: grid;
      gap: 4px;
      background: #fff;
    }

    .window-card strong {
      color: var(--ink);
      line-height: 1.25;
    }

    .window-card span {
      color: var(--muted);
      font-size: .88rem;
      line-height: 1.3;
    }

    .dependency-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin: 2px 0 0;
      padding: 0;
      list-style: none;
    }

    .dependency-list li {
      min-height: 22px;
      display: inline-flex;
      align-items: center;
      border: 1px solid color-mix(in srgb, var(--window-color, var(--row-color)), #ffffff 46%);
      border-radius: 999px;
      background: color-mix(in srgb, var(--window-color, var(--row-color)), #ffffff 91%);
      color: #343a36;
      font-size: .74rem;
      font-weight: 720;
      line-height: 1;
      padding: 0 7px;
    }

    .timeline-panel {
      padding: 20px;
    }

    .timeline-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 16px;
    }

    h2 {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: 0;
    }

    .total {
      color: var(--muted);
      font-size: .92rem;
      white-space: nowrap;
    }

    .dependency-map {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 8px;
      margin-bottom: 18px;
    }

    .dependency-heading {
      margin-bottom: 9px;
    }

    .dependency-item {
      display: grid;
      gap: 6px;
      min-width: 0;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-left: 5px solid var(--window-color);
      border-radius: 8px;
      background: #fff;
    }

    .dependency-item strong {
      color: var(--ink);
      font-size: .9rem;
      line-height: 1.2;
    }

    .timeline {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 14px;
      align-items: stretch;
    }

    .calendar-scroll {
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 8px;
      scrollbar-gutter: stable;
      min-width: 0;
    }

    .time-scale {
      position: relative;
      min-height: var(--calendar-height);
      border-right: 1px solid var(--line);
    }

    .time-tick {
      position: absolute;
      right: 12px;
      top: var(--tick-top);
      transform: translateY(-50%);
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-size: .88rem;
      line-height: 1.25;
      text-align: right;
    }

    .calendar-grid {
      position: relative;
      width: max(100%, var(--calendar-min-width, 100%));
      min-width: var(--calendar-min-width, 100%);
      min-height: var(--calendar-height);
      background:
        repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent calc(var(--hour-height) - 1px),
          #edf0e9 calc(var(--hour-height) - 1px),
          #edf0e9 var(--hour-height)
        );
    }

    .calendar-card {
      position: absolute;
      left: calc(var(--lane-left) * 1%);
      top: var(--window-top);
      width: calc(var(--lane-width) * 1%);
      height: var(--window-height);
      padding: 0 5px;
      z-index: 1;
    }

    .task {
      height: 100%;
      border: 1px solid var(--line);
      border-left: 7px solid var(--row-color);
      border-radius: 8px;
      background: #fff;
      padding: 10px 11px;
      display: grid;
      gap: 7px;
      align-content: start;
      overflow: hidden;
      transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease;
    }

    .calendar-card.active .task {
      border-color: color-mix(in srgb, var(--row-color), #1b1d1c 12%);
      box-shadow: 0 10px 28px rgba(33, 79, 60, .17);
      transform: translateY(-1px);
    }

    .section {
      color: var(--row-color);
      font-size: .78rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .task-title {
      color: var(--ink);
      font-weight: 760;
      line-height: 1.3;
    }

    .task-note {
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.35;
    }

    .calendar-card.compact .task-note {
      display: none;
    }

    .task .dependency-list {
      gap: 4px;
      overflow: hidden;
    }

    .calendar-card.compact .dependency-list li {
      font-size: .68rem;
      min-height: 20px;
      padding: 0 6px;
    }

    .calendar-card.compact .window-tags {
      display: none;
    }

    .now-line {
      position: absolute;
      left: 0;
      right: 0;
      top: var(--now-top);
      display: grid;
      grid-template-columns: 54px 1fr;
      align-items: center;
      gap: 8px;
      pointer-events: none;
      z-index: 3;
    }

    .now-label {
      min-height: 24px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      background: var(--ink);
      color: #fff;
      font-size: .75rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .now-rule {
      height: 2px;
      background: var(--ink);
      box-shadow: 0 1px 0 rgba(255, 255, 255, .7);
    }

    .window-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .window-tag {
      display: inline-flex;
      align-items: center;
      min-height: 25px;
      padding: 0 8px;
      border: 1px solid color-mix(in srgb, var(--window-color), #ffffff 36%);
      border-radius: 999px;
      background: color-mix(in srgb, var(--window-color), #ffffff 88%);
      color: #262b28;
      font-size: .78rem;
      font-weight: 760;
      line-height: 1;
    }

    @media (max-width: 840px) {
      .bar {
        grid-template-columns: 1fr;
        padding: 16px 0;
        gap: 14px;
      }

      .controls {
        justify-content: flex-start;
      }

      main {
        grid-template-columns: 1fr;
      }

      .now-panel {
        position: relative;
        top: 0;
      }
    }

    @media (max-width: 560px) {
      .bar,
      main {
        width: min(100vw - 20px, 1180px);
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr;
        width: 100%;
      }

      .toggle {
        grid-column: 1 / -1;
      }

      input[type="time"] {
        width: 100%;
        min-width: 0;
      }

      .timeline-panel {
        padding: 14px;
      }

      .timeline {
        grid-template-columns: 58px minmax(0, 1fr);
        gap: 8px;
      }

      .time-tick {
        right: 8px;
        font-size: .78rem;
      }

      .calendar-card {
        padding: 0 3px;
      }

      .task {
        padding: 8px 9px;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }

      .metric,
      .metric:nth-child(even),
      .metric:nth-last-child(-n + 2) {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .metric:last-child {
        border-bottom: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="bar">
        <h1>Optimal Windows</h1>
        <div class="controls" aria-label="Window controls">
          <label>
            Wake
            <input id="wakeTime" type="time" value="05:15">
          </label>
          <label>
            Target next wake
            <input id="nextWakeTime" type="time">
          </label>
          <label class="toggle">
            <input id="showOptional" type="checkbox" checked>
            Show optional windows
          </label>
        </div>
      </div>
    </header>

    <main>
      <section class="panel now-panel" aria-live="polite">
        <div class="state-band"></div>
        <div class="now-body">
          <div>
            <p class="eyebrow">Best window now</p>
            <h2 id="stateName" class="state-name">Loading</h2>
          </div>
          <p id="currentWork" class="current-work"></p>
          <div class="meta-grid">
            <div class="metric">
              <span>Window</span>
              <strong id="blockTime"></strong>
            </div>
            <div class="metric">
              <span>Since Wake</span>
              <strong id="elapsed"></strong>
            </div>
            <div class="metric">
              <span>Next Open</span>
              <strong id="nextShift"></strong>
            </div>
            <div class="metric">
              <span>Until Bed</span>
              <strong id="focusMode"></strong>
            </div>
          </div>
          <div>
            <p class="eyebrow">Good fits</p>
            <ul id="bestWork" class="work-list"></ul>
          </div>
          <div>
            <p class="eyebrow">Also open</p>
            <ul id="timingWindows" class="window-list"></ul>
          </div>
        </div>
      </section>

      <section class="panel timeline-panel">
        <div class="timeline-head">
          <h2>Window Map</h2>
          <div id="dayTotal" class="total"></div>
        </div>
        <p class="eyebrow dependency-heading">Dependencies</p>
        <div id="dependencyMap" class="dependency-map" aria-label="Window dependencies"></div>
        <div id="timeline" class="timeline"></div>
      </section>
    </main>
  </div>

  <script>
    const minutesPerDay = 24 * 60;

    const windowTemplates = [
      {
        id: "sleep",
        label: "Sleep",
        group: "Recovery",
        color: "#7a5a8c",
        priority: 100,
        fixedStartClock: 21 * 60,
        fixedEndClock: 22 * 60,
        posture: "Protect",
        dependencies: ["Wake time", "Target next wake"],
        note: "The target bedtime range for 8-9 hours before the selected next wake, or 9-10pm by default.",
        fits: [
          "Start wind-down before this opens",
          "Low light, low stimulation, no new intense inputs",
          "Set up the morning and let the day close"
        ]
      },
      {
        id: "deep-work",
        label: "Deep creation",
        group: "Task type",
        color: "#214f3c",
        priority: 90,
        startOffset: 90,
        endOffset: 270,
        posture: "Create",
        note: "The cleanest window for writing, architecture, analysis, hard thinking, and original output.",
        fits: [
          "Writing and synthesis",
          "Hard analytical work",
          "Planning that turns into concrete output"
        ]
      },
      {
        id: "first-coffee",
        label: "First coffee",
        group: "Inputs",
        color: "#6f4b33",
        priority: 82,
        startOffset: 75,
        endOffset: 165,
        posture: "Caffeinate",
        dependencies: ["Wake time"],
        note: "Best after the waking cortisol spike settles, paired with the first serious output window.",
        fits: [
          "Pair with deep creation",
          "Avoid spending the lift on inbox drift",
          "Hydrate first"
        ]
      },
      {
        id: "analysis",
        label: "Analysis and decisions",
        group: "Task type",
        color: "#426a8d",
        priority: 76,
        startOffset: 240,
        endOffset: 420,
        posture: "Decide",
        note: "Good for review, prioritization, specs, debugging, and decisions that need steadiness.",
        fits: [
          "Code review and debugging",
          "Specs, tradeoffs, and sequencing",
          "Important messages after thinking is done"
        ]
      },
      {
        id: "second-coffee",
        label: "Second coffee",
        group: "Inputs",
        color: "#8b6239",
        priority: 70,
        startOffset: 390,
        endOffset: 510,
        optional: true,
        posture: "Lift",
        dependencies: ["First coffee"],
        note: "A useful midday lift, ideally far enough from sleep to avoid stealing from recovery.",
        fits: [
          "Use for maintenance or execution",
          "Keep it bounded",
          "Skip if sleep debt is winning"
        ]
      },
      {
        id: "nap",
        label: "Nap",
        group: "Recovery",
        color: "#7a5a8c",
        priority: 86,
        startOffset: 420,
        endOffset: 540,
        optional: true,
        posture: "Recover",
        dependencies: ["Wake time", "First coffee", "Second coffee", "Optional Zyn"],
        note: "A 10-25 minute reset window, best before the day gets too late.",
        fits: [
          "Short nap, not a second sleep",
          "NSDR or eyes-closed rest also fits",
          "Use when the afternoon cliff is real"
        ]
      },
      {
        id: "execution",
        label: "Execution",
        group: "Task type",
        color: "#78904f",
        priority: 64,
        startOffset: 420,
        endOffset: 660,
        posture: "Execute",
        note: "Best for implementation, follow-through, materials, coordination, and moving known work forward.",
        fits: [
          "Implementation and follow-ups",
          "Materials, checklists, and coordination",
          "Known next actions"
        ]
      },
      {
        id: "zyn",
        label: "Optional Zyn",
        group: "Inputs",
        color: "#4d8794",
        priority: 58,
        startOffset: 480,
        endOffset: 660,
        optional: true,
        posture: "Constrain",
        note: "Only useful if it tightens execution; it is a bad trade when it pulls you into reactivity.",
        fits: [
          "Pair with execution, not scrolling",
          "Keep it away from late day recovery",
          "Skip when stress is already high"
        ]
      },
      {
        id: "reactive",
        label: "Reactive and social tasks",
        group: "Task type",
        color: "#b86948",
        priority: 48,
        startOffset: 570,
        endOffset: 780,
        posture: "Respond",
        note: "The better window for meetings, inbox, lower-cognitive tasks, and opportunistic cleanup.",
        fits: [
          "Meetings and inbox",
          "Small commitments",
          "Tasks that benefit from momentum more than insight"
        ]
      },
      {
        id: "workout",
        label: "Workout",
        group: "Body",
        color: "#d3a642",
        priority: 78,
        relativeToSleep: true,
        startBeforeSleep: 300,
        endBeforeSleep: 150,
        posture: "Train",
        note: "Late afternoon or early evening training, leaving enough runway to come down before bed.",
        fits: [
          "Strength, conditioning, or hard walk",
          "Shower and food afterward",
          "Do not let it collide with wind-down"
        ]
      },
      {
        id: "alcohol",
        label: "Alcohol, if any",
        group: "Inputs",
        color: "#9a4f65",
        priority: 30,
        relativeToSleep: true,
        startBeforeSleep: 330,
        endBeforeSleep: 210,
        optional: true,
        posture: "Limit",
        note: "If drinking, earlier is better; leave a clear buffer before the sleep window.",
        fits: [
          "Social drink only, not a nightcap",
          "Stop at least 3 hours before sleep",
          "Hydrate and eat with it"
        ]
      },
      {
        id: "wind-down",
        label: "Wind-down",
        group: "Recovery",
        color: "#626a66",
        priority: 74,
        relativeToSleep: true,
        startBeforeSleep: 90,
        endBeforeSleep: 0,
        posture: "Downshift",
        dependencies: ["Sleep"],
        note: "The buffer that makes the sleep window realistic.",
        fits: [
          "Dinner cleanup, prep, light reading",
          "Stretching and low-stimulation conversation",
          "Tomorrow setup without re-opening the day"
        ]
      }
    ];

    const els = {
      wakeTime: document.querySelector("#wakeTime"),
      nextWakeTime: document.querySelector("#nextWakeTime"),
      showOptional: document.querySelector("#showOptional"),
      stateName: document.querySelector("#stateName"),
      currentWork: document.querySelector("#currentWork"),
      blockTime: document.querySelector("#blockTime"),
      elapsed: document.querySelector("#elapsed"),
      nextShift: document.querySelector("#nextShift"),
      focusMode: document.querySelector("#focusMode"),
      bestWork: document.querySelector("#bestWork"),
      timingWindows: document.querySelector("#timingWindows"),
      dependencyMap: document.querySelector("#dependencyMap"),
      timeline: document.querySelector("#timeline"),
      dayTotal: document.querySelector("#dayTotal"),
      stateBand: document.querySelector(".state-band"),
      nowPanel: document.querySelector(".now-panel")
    };

    function parseClock(raw) {
      const match = /^(\d{1,2}):(\d{2})$/.exec(raw);
      if (!match) return null;
      const hour = Number(match[1]);
      const minute = Number(match[2]);
      if (hour < 0 || hour > 23 || minute < 0 || minute > 59) return null;
      return hour * 60 + minute;
    }

    function formatClock(totalMinutes) {
      const normalized = ((totalMinutes % minutesPerDay) + minutesPerDay) % minutesPerDay;
      const hour = Math.floor(normalized / 60);
      const minute = normalized % 60;
      return `${String(hour).padStart(2, "0")}:${String(minute).padStart(2, "0")}`;
    }

    function formatDuration(minutes) {
      const hours = Math.floor(minutes / 60);
      const remainder = minutes % 60;
      if (hours && remainder) return `${hours}h ${remainder}m`;
      if (hours) return `${hours}h`;
      return `${remainder}m`;
    }

    function currentClockValue() {
      const now = new Date();
      return `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    }

    function elapsedFromWake(wakeMinutes, currentMinutes) {
      const delta = currentMinutes - wakeMinutes;
      return delta >= 0 ? delta : minutesPerDay + delta;
    }

    function targetNextWakeFromInput(wakeMinutes) {
      const nextWake = parseClock(els.nextWakeTime.value);
      if (nextWake === null) return null;
      const candidate = clockTimeWithinDay(wakeMinutes, nextWake);
      return candidate - wakeMinutes < 12 * 60 ? candidate + minutesPerDay : candidate;
    }

    function clockTimeWithinDay(wakeMinutes, clockMinutes) {
      return clockMinutes >= wakeMinutes ? clockMinutes : clockMinutes + minutesPerDay;
    }

    function buildWindows(wakeMinutes, showOptional, targetNextWake) {
      const sleepTemplate = windowTemplates.find((template) => template.id === "sleep");
      const sleepStart = targetNextWake
        ? targetNextWake - 9 * 60
        : clockTimeWithinDay(wakeMinutes, sleepTemplate.fixedStartClock);
      const sleepEnd = targetNextWake
        ? targetNextWake - 8 * 60
        : clockTimeWithinDay(wakeMinutes, sleepTemplate.fixedEndClock);

      return windowTemplates
        .filter((template) => showOptional || !template.optional)
        .map((template) => {
          const start = template.id === "sleep"
            ? sleepStart
            : typeof template.fixedStartClock === "number"
            ? clockTimeWithinDay(wakeMinutes, template.fixedStartClock)
            : template.relativeToSleep
            ? sleepStart - template.startBeforeSleep
            : wakeMinutes + template.startOffset;
          const end = template.id === "sleep"
            ? sleepEnd
            : typeof template.fixedEndClock === "number"
            ? clockTimeWithinDay(wakeMinutes, template.fixedEndClock)
            : template.relativeToSleep
            ? sleepStart - template.endBeforeSleep
            : wakeMinutes + template.endOffset;

          return {
            ...template,
            start,
            end,
            duration: end - start
          };
        })
        .sort((a, b) => a.start - b.start || b.priority - a.priority);
    }

    function activeWindowsForCurrent(windows, absoluteCurrent) {
      return windows
        .filter((windowItem) => absoluteCurrent >= windowItem.start && absoluteCurrent < windowItem.end)
        .sort((a, b) => b.priority - a.priority || a.end - b.end);
    }

    function nextWindow(windows, absoluteCurrent) {
      const upcoming = windows.find((windowItem) => windowItem.start > absoluteCurrent);
      if (upcoming) return upcoming;
      return {
        ...windows[0],
        start: windows[0].start + minutesPerDay,
        end: windows[0].end + minutesPerDay
      };
    }

    function timeUntilBed(windows, absoluteCurrent) {
      const sleepWindow = windows.find((windowItem) => windowItem.id === "sleep");
      if (!sleepWindow) return "none";
      if (absoluteCurrent >= sleepWindow.start && absoluteCurrent < sleepWindow.end) return "now";

      const sleepStart = sleepWindow.start > absoluteCurrent
        ? sleepWindow.start
        : sleepWindow.start + minutesPerDay;
      return formatDuration(sleepStart - absoluteCurrent);
    }

    function windowDependencies(windowItem) {
      if (windowItem.dependencies?.length) return windowItem.dependencies;
      if (windowItem.relativeToSleep) return ["Sleep"];
      if (typeof windowItem.fixedStartClock === "number") return ["Wake time"];
      return ["Wake time"];
    }

    function renderDependencies(windowItem) {
      return `
        <ul class="dependency-list" aria-label="${windowItem.label} dependencies">
          ${windowDependencies(windowItem).map((dependency) => `<li>${dependency}</li>`).join("")}
        </ul>
      `;
    }

    function renderDependencyMap(windows) {
      return windows.map((windowItem) => `
        <section class="dependency-item" style="--window-color: ${windowItem.color}">
          <strong>${windowItem.label}</strong>
          ${renderDependencies(windowItem)}
        </section>
      `).join("");
    }

    function calendarBounds(wakeMinutes) {
      return {
        start: wakeMinutes,
        end: wakeMinutes + minutesPerDay,
        hourHeight: 72
      };
    }

    function layoutCalendarWindows(windows) {
      const sorted = windows.map((windowItem) => ({ ...windowItem })).sort((a, b) => a.start - b.start || a.end - b.end);
      const clusters = [];
      let activeCluster = null;

      sorted.forEach((windowItem) => {
        if (!activeCluster || windowItem.start >= activeCluster.end) {
          activeCluster = {
            end: windowItem.end,
            items: [windowItem]
          };
          clusters.push(activeCluster);
          return;
        }

        activeCluster.items.push(windowItem);
        activeCluster.end = Math.max(activeCluster.end, windowItem.end);
      });

      clusters.forEach((cluster) => {
        const laneEnds = [];
        cluster.items.forEach((windowItem) => {
          let lane = laneEnds.findIndex((end) => end <= windowItem.start);
          if (lane === -1) {
            lane = laneEnds.length;
            laneEnds.push(windowItem.end);
          } else {
            laneEnds[lane] = windowItem.end;
          }
          windowItem.lane = lane;
        });

        cluster.items.forEach((windowItem) => {
          const overlappingItems = cluster.items.filter((candidate) => {
            return candidate.start < windowItem.end && candidate.end > windowItem.start;
          });
          const lanes = overlappingItems.map((candidate) => candidate.lane);
          const minLane = Math.min(...lanes);
          const maxLane = Math.max(...lanes);
          windowItem.laneOffset = windowItem.lane - minLane;
          windowItem.laneCount = Math.max(1, maxLane - minLane + 1);
        });
      });

      return sorted;
    }

    function renderTimeScale(bounds) {
      const ticks = [];
      const visibleHours = Math.ceil((bounds.end - bounds.start) / 60);
      for (let hour = 0; hour <= visibleHours; hour += 2) {
        ticks.push(`
          <div class="time-tick" style="--tick-top: ${hour * bounds.hourHeight}px">
            ${formatClock(bounds.start + hour * 60)}
          </div>
        `);
      }
      return ticks.join("");
    }

    function renderWindowCard(windowItem, absoluteCurrent) {
      const isOpen = absoluteCurrent >= windowItem.start && absoluteCurrent < windowItem.end;
      const status = isOpen ? `${formatDuration(windowItem.end - absoluteCurrent)} left` : "upcoming";

      return `
        <li class="window-card" style="--window-color: ${windowItem.color}">
          <strong>${windowItem.label}</strong>
          <span>${formatClock(windowItem.start)}-${formatClock(windowItem.end)} - ${status}</span>
          ${renderDependencies(windowItem)}
          <span>${windowItem.note}</span>
        </li>
      `;
    }

    function render() {
      const wake = parseClock(els.wakeTime.value) ?? parseClock("06:00");
      const targetNextWake = targetNextWakeFromInput(wake);
      const daySummary = targetNextWake
        ? `${formatClock(wake)} wake, ${formatClock(targetNextWake)} target next wake`
        : `${formatClock(wake)} wake, 24h view`;
      const current = parseClock(currentClockValue());
      const elapsed = elapsedFromWake(wake, current);
      const absoluteCurrent = wake + elapsed;
      const bounds = calendarBounds(wake);
      const windows = buildWindows(wake, els.showOptional.checked, targetNextWake)
        .filter((windowItem) => windowItem.start < bounds.end && windowItem.end > bounds.start);
      const activeWindows = activeWindowsForCurrent(windows, absoluteCurrent);
      const calendarHeight = (bounds.end - bounds.start) / 60 * bounds.hourHeight;
      const minuteHeight = bounds.hourHeight / 60;

      if (!windows.length) {
        document.documentElement.style.setProperty("--state-color", "#626a66");
        els.nowPanel.style.setProperty("--state-color", "#626a66");
        els.stateBand.style.setProperty("--state-color", "#626a66");
        els.stateName.textContent = "No windows";
        els.currentWork.textContent = "No configured windows fall inside this 24-hour wake cycle.";
        els.blockTime.textContent = `${formatClock(wake)}-${formatClock(bounds.end)}`;
        els.elapsed.textContent = formatDuration(elapsed);
        els.nextShift.textContent = "none";
        els.focusMode.textContent = "none";
        els.bestWork.innerHTML = "<li>Edit the window templates or adjust the wake time.</li>";
        els.timingWindows.innerHTML = "";
        els.dependencyMap.innerHTML = "";
        els.dayTotal.textContent = daySummary;
        els.timeline.style.setProperty("--calendar-height", `${calendarHeight}px`);
        els.timeline.style.setProperty("--hour-height", `${bounds.hourHeight}px`);
        els.timeline.style.setProperty("--calendar-min-width", "100%");
        els.timeline.innerHTML = `
          <div class="time-scale">${renderTimeScale(bounds)}</div>
          <div class="calendar-scroll">
            <div class="calendar-grid"></div>
          </div>
        `;
        return;
      }

      const primary = activeWindows[0] || nextWindow(windows, absoluteCurrent);
      const next = nextWindow(windows, absoluteCurrent);
      const laidOutWindows = layoutCalendarWindows(windows);
      const maxLaneCount = Math.max(1, ...laidOutWindows.map((item) => item.laneCount));

      document.documentElement.style.setProperty("--state-color", primary.color);
      els.nowPanel.style.setProperty("--state-color", primary.color);
      els.stateBand.style.setProperty("--state-color", primary.color);
      els.stateName.textContent = activeWindows.length ? primary.label : "Between windows";
      els.currentWork.textContent = activeWindows.length
        ? primary.note
        : `Next best window: ${next.label} at ${formatClock(next.start)}.`;
      els.blockTime.textContent = `${formatClock(primary.start)}-${formatClock(primary.end)}`;
      els.elapsed.textContent = formatDuration(elapsed);
      els.nextShift.textContent = next.start > absoluteCurrent
        ? `${next.label} in ${formatDuration(next.start - absoluteCurrent)}`
        : `${next.label} now`;
      els.focusMode.textContent = timeUntilBed(windows, absoluteCurrent);
      els.bestWork.innerHTML = primary.fits.map((item) => `<li>${item}</li>`).join("");

      const secondaryWindows = activeWindows.filter((windowItem) => windowItem !== primary);
      els.timingWindows.innerHTML = secondaryWindows.length
        ? secondaryWindows.map((windowItem) => renderWindowCard(windowItem, absoluteCurrent)).join("")
        : renderWindowCard(next, absoluteCurrent);

      els.dependencyMap.innerHTML = renderDependencyMap(windows);
      els.dayTotal.textContent = daySummary;
      els.timeline.style.setProperty("--calendar-height", `${calendarHeight}px`);
      els.timeline.style.setProperty("--hour-height", `${bounds.hourHeight}px`);
      els.timeline.style.setProperty("--calendar-min-width", `${maxLaneCount * 170}px`);
      els.timeline.innerHTML = `
        <div class="time-scale">${renderTimeScale(bounds)}</div>
        <div class="calendar-scroll">
          <div class="calendar-grid">
            ${absoluteCurrent >= bounds.start && absoluteCurrent <= bounds.end ? `
            <div class="now-line" style="--now-top: ${(absoluteCurrent - bounds.start) * minuteHeight}px">
              <span class="now-label">${formatClock(absoluteCurrent)}</span>
              <span class="now-rule"></span>
            </div>` : ""}
            ${laidOutWindows.map((item) => {
        const isActive = activeWindows.includes(item);
        const optional = item.optional ? `<span class="window-tag" style="--window-color: ${item.color}">optional</span>` : "";
        const active = isActive ? `<span class="window-tag" style="--window-color: ${item.color}">open now</span>` : "";
        const clippedStart = Math.max(item.start, bounds.start);
        const clippedEnd = Math.min(item.end, bounds.end);
        const top = (clippedStart - bounds.start) * minuteHeight;
        const height = (clippedEnd - clippedStart) * minuteHeight;
        const laneWidth = 100 / item.laneCount;
        const laneLeft = item.laneOffset * laneWidth;
        const compact = item.duration <= 75 || item.laneCount > 2;

        return `
          <article
            class="calendar-card ${isActive ? "active" : ""} ${compact ? "compact" : ""}"
            style="--row-color: ${item.color}; --window-top: ${top}px; --window-height: ${height}px; --lane-left: ${laneLeft}; --lane-width: ${laneWidth}"
          >
            <div class="task">
              <div class="section">${formatClock(item.start)}-${formatClock(item.end)} - ${item.group}</div>
              <div class="task-title">${item.label}</div>
              ${renderDependencies(item)}
              <div class="task-note">${item.note}</div>
              <div class="window-tags">${active}${optional}</div>
            </div>
          </article>
        `;
      }).join("")}
          </div>
        </div>
      `;
    }

    els.wakeTime.addEventListener("input", render);
    els.nextWakeTime.addEventListener("input", render);
    els.showOptional.addEventListener("input", render);

    render();
    window.setInterval(render, 60 * 1000);
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>State Lines</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1b1d1c;
      --muted: #626a66;
      --line: #d9ddd5;
      --paper: #f7f6f0;
      --surface: #ffffff;
      --alert: #b86948;
      --focus: #214f3c;
      --control: #426a8d;
      --speed: #78904f;
      --physical: #d3a642;
      --sleep: #7a5a8c;
      --shadow: 0 18px 55px rgba(31, 34, 29, .13);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .45), rgba(255, 255, 255, 0) 36%),
        var(--paper);
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: rgba(247, 246, 240, .88);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 4;
    }

    .bar {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      min-height: 74px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 20px;
    }

    .title-row {
      display: flex;
      align-items: baseline;
      gap: 14px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.55rem, 1.2rem + 1.3vw, 2.55rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .page-link {
      color: var(--focus);
      font-size: .9rem;
      font-weight: 800;
      text-decoration: none;
    }

    .page-link:hover {
      text-decoration: underline;
    }

    .controls {
      display: flex;
      align-items: end;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    input[type="time"] {
      appearance: none;
      border: 1px solid #c8cec5;
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      min-height: 42px;
      padding: 0 12px;
      min-width: 132px;
      box-shadow: 0 1px 0 rgba(255, 255, 255, .7);
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 46px;
      display: grid;
      gap: 18px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .summary-panel {
      padding: 18px 20px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 1px;
      overflow: hidden;
    }

    .metric {
      min-height: 86px;
      display: grid;
      align-content: center;
      gap: 6px;
      padding: 14px;
      background: #fafaf6;
      border-left: 5px solid var(--metric-color);
    }

    .metric span {
      color: var(--muted);
      font-size: .74rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .metric strong {
      font-size: clamp(1.35rem, 1.1rem + 1vw, 2.1rem);
      line-height: 1;
    }

    .chart-panel {
      padding: 20px;
    }

    .chart-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 16px;
    }

    h2 {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: 0;
    }

    .total {
      color: var(--muted);
      font-size: .92rem;
      white-space: nowrap;
    }

    .chart-wrap {
      overflow-x: auto;
      padding-bottom: 8px;
    }

    svg {
      display: block;
      width: 100%;
      min-width: 860px;
      height: auto;
    }

    .grid-line {
      stroke: #e7eae2;
      stroke-width: 1;
    }

    .axis-text {
      fill: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .state-line {
      fill: none;
      stroke: var(--line-color);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .sleep-band {
      fill: var(--sleep);
      opacity: .08;
    }

    .now-line {
      stroke: var(--ink);
      stroke-width: 2;
    }

    .now-label {
      fill: var(--ink);
      font-size: 12px;
      font-weight: 800;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 16px 0 0;
      padding: 0;
      list-style: none;
    }

    .legend li {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      border: 1px solid color-mix(in srgb, var(--line-color), #ffffff 36%);
      border-radius: 999px;
      background: color-mix(in srgb, var(--line-color), #ffffff 90%);
      color: #262b28;
      font-size: .86rem;
      font-weight: 760;
    }

    .legend li::before {
      content: "";
      width: 18px;
      height: 4px;
      border-radius: 999px;
      background: var(--line-color);
    }

    .note-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .note {
      border: 1px solid var(--line);
      border-left: 5px solid var(--line-color);
      border-radius: 8px;
      padding: 11px 12px;
      display: grid;
      gap: 5px;
      background: #fff;
    }

    .note strong {
      line-height: 1.25;
    }

    .note span {
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.35;
    }

    @media (max-width: 840px) {
      .bar {
        grid-template-columns: 1fr;
        padding: 16px 0;
        gap: 14px;
      }

      .controls {
        justify-content: flex-start;
      }

      .summary-panel {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .bar,
      main {
        width: min(100vw - 20px, 1180px);
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr;
        width: 100%;
      }

      input[type="time"] {
        width: 100%;
        min-width: 0;
      }

      .chart-panel {
        padding: 14px;
      }

      .summary-panel {
        grid-template-columns: 1fr;
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div class="title-row">
        <h1>State Lines</h1>
        <a class="page-link" href="cognitive-map.html">Cognitive Map</a>
      </div>
      <div class="controls" aria-label="State line controls">
        <label>
          Wake
          <input id="wakeTime" type="time" value="05:15">
        </label>
        <label>
          Target next wake
          <input id="nextWakeTime" type="time">
        </label>
      </div>
    </div>
  </header>

  <main>
    <section id="summary" class="panel summary-panel" aria-live="polite"></section>

    <section class="panel chart-panel">
      <div class="chart-head">
        <h2>Component Strength</h2>
        <div id="dayTotal" class="total"></div>
      </div>
      <div id="chart" class="chart-wrap"></div>
      <ul id="legend" class="legend"></ul>
      <div id="notes" class="note-grid"></div>
    </section>
  </main>

  <script>
    const minutesPerDay = 24 * 60;
    const chart = {
      width: 1040,
      height: 440,
      left: 58,
      right: 22,
      top: 26,
      bottom: 48
    };

    const components = [
      {
        id: "alertness",
        label: "Alertness",
        color: "#b86948",
        note: "Raw wakefulness and ability to stay online.",
        value(hour) {
          return clamp(20 + 70 * logistic((hour - 0.7) / 0.75) - 2.2 * Math.max(0, hour - 7));
        }
      },
      {
        id: "focus",
        label: "Focus",
        color: "#214f3c",
        note: "Deep context holding, synthesis, writing, and hard reasoning.",
        value(hour) {
          return clamp(12 + 82 * gaussian(hour, 2.7, 2.2) + 18 * gaussian(hour, 5.0, 3.8));
        }
      },
      {
        id: "control",
        label: "Executive control",
        color: "#426a8d",
        note: "Planning, inhibition, prioritization, and staying on chosen work.",
        value(hour) {
          return clamp(22 + 64 * gaussian(hour, 4.4, 4.0) - 1.7 * Math.max(0, hour - 10));
        }
      },
      {
        id: "speed",
        label: "Processing speed",
        color: "#78904f",
        note: "Routine decisions, scanning, task switching, and execution tempo.",
        value(hour) {
          return clamp(28 + 55 * logistic((hour - 1.0) / 0.9) - 2.6 * Math.max(0, hour - 10));
        }
      },
      {
        id: "physical",
        label: "Physical readiness",
        color: "#d3a642",
        note: "High means body readiness is high and recovery need is low.",
        value(hour) {
          return clamp(18 + 78 * gaussian(hour, 10.5, 4.4) + 10 * gaussian(hour, 5.5, 5.8) - 2.2 * Math.max(0, hour - 15));
        }
      }
    ];

    const els = {
      wakeTime: document.querySelector("#wakeTime"),
      nextWakeTime: document.querySelector("#nextWakeTime"),
      dayTotal: document.querySelector("#dayTotal"),
      chart: document.querySelector("#chart"),
      legend: document.querySelector("#legend"),
      notes: document.querySelector("#notes"),
      summary: document.querySelector("#summary")
    };

    function clamp(value) {
      return Math.max(0, Math.min(100, value));
    }

    function gaussian(value, center, width) {
      return Math.exp(-0.5 * ((value - center) / width) ** 2);
    }

    function logistic(value) {
      return 1 / (1 + Math.exp(-value));
    }

    function parseClock(raw) {
      const match = /^(\d{1,2}):(\d{2})$/.exec(raw);
      if (!match) return null;
      const hour = Number(match[1]);
      const minute = Number(match[2]);
      if (hour < 0 || hour > 23 || minute < 0 || minute > 59) return null;
      return hour * 60 + minute;
    }

    function formatClock(totalMinutes) {
      const normalized = ((totalMinutes % minutesPerDay) + minutesPerDay) % minutesPerDay;
      const hour = Math.floor(normalized / 60);
      const minute = normalized % 60;
      return `${String(hour).padStart(2, "0")}:${String(minute).padStart(2, "0")}`;
    }

    function currentClockValue() {
      const now = new Date();
      return `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    }

    function elapsedFromWake(wakeMinutes, currentMinutes) {
      const delta = currentMinutes - wakeMinutes;
      return delta >= 0 ? delta : minutesPerDay + delta;
    }

    function clockTimeWithinDay(wakeMinutes, clockMinutes) {
      return clockMinutes >= wakeMinutes ? clockMinutes : clockMinutes + minutesPerDay;
    }

    function targetNextWakeFromInput(wakeMinutes) {
      const nextWake = parseClock(els.nextWakeTime.value);
      if (nextWake === null) return null;
      const candidate = clockTimeWithinDay(wakeMinutes, nextWake);
      return candidate - wakeMinutes < 12 * 60 ? candidate + minutesPerDay : candidate;
    }

    function sleepWindow(wake, targetNextWake) {
      return {
        start: targetNextWake
          ? targetNextWake - 9 * 60
          : clockTimeWithinDay(wake, 21 * 60),
        end: targetNextWake
          ? targetNextWake - 8 * 60
          : clockTimeWithinDay(wake, 22 * 60)
      };
    }

    function graphEndHour(wake, targetNextWake) {
      const sleep = sleepWindow(wake, targetNextWake);
      return Math.max(1, (sleep.end - wake) / 60);
    }

    function pointFor(hour, value, endHour) {
      const plotWidth = chart.width - chart.left - chart.right;
      const plotHeight = chart.height - chart.top - chart.bottom;
      const x = chart.left + plotWidth * (hour / endHour);
      const y = chart.top + plotHeight * (1 - value / 100);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }

    function pathFor(component, endHour) {
      const points = [];
      const endMinutes = Math.round(endHour * 60);
      for (let minute = 0; minute <= endMinutes; minute += 15) {
        const hour = minute / 60;
        points.push(pointFor(hour, component.value(hour), endHour));
      }
      if (endMinutes % 15 !== 0) {
        points.push(pointFor(endHour, component.value(endHour), endHour));
      }
      return points.join(" ");
    }

    function renderGrid(wake, endHour) {
      const plotWidth = chart.width - chart.left - chart.right;
      const plotHeight = chart.height - chart.top - chart.bottom;
      const lines = [];

      for (let value = 0; value <= 100; value += 25) {
        const y = chart.top + plotHeight * (1 - value / 100);
        lines.push(`<line class="grid-line" x1="${chart.left}" x2="${chart.width - chart.right}" y1="${y}" y2="${y}"></line>`);
        lines.push(`<text class="axis-text" x="${chart.left - 12}" y="${y + 4}" text-anchor="end">${value}</text>`);
      }

      for (let hour = 0; hour <= endHour; hour += 3) {
        const x = chart.left + plotWidth * (hour / endHour);
        lines.push(`<line class="grid-line" x1="${x}" x2="${x}" y1="${chart.top}" y2="${chart.height - chart.bottom}"></line>`);
        lines.push(`<text class="axis-text" x="${x}" y="${chart.height - 18}" text-anchor="middle">${formatClock(wake + hour * 60)}</text>`);
      }

      if (endHour % 3 !== 0) {
        const x = chart.left + plotWidth;
        lines.push(`<line class="grid-line" x1="${x}" x2="${x}" y1="${chart.top}" y2="${chart.height - chart.bottom}"></line>`);
        lines.push(`<text class="axis-text" x="${x}" y="${chart.height - 18}" text-anchor="middle">${formatClock(wake + endHour * 60)}</text>`);
      }

      return lines.join("");
    }

    function renderSleepBand(wake, targetNextWake, endHour) {
      const sleep = sleepWindow(wake, targetNextWake);
      const startHour = Math.max(0, (sleep.start - wake) / 60);
      if (endHour <= startHour) return "";

      const plotWidth = chart.width - chart.left - chart.right;
      const x = chart.left + plotWidth * (startHour / endHour);
      const width = plotWidth * ((endHour - startHour) / endHour);
      return `<rect class="sleep-band" x="${x}" y="${chart.top}" width="${width}" height="${chart.height - chart.top - chart.bottom}"></rect>`;
    }

    function renderNowLine(elapsed, endHour) {
      const currentHour = elapsed / 60;
      if (currentHour < 0 || currentHour > endHour) return "";
      const plotWidth = chart.width - chart.left - chart.right;
      const x = chart.left + plotWidth * (currentHour / endHour);
      return `
        <line class="now-line" x1="${x}" x2="${x}" y1="${chart.top}" y2="${chart.height - chart.bottom}"></line>
        <text class="now-label" x="${x + 8}" y="${chart.top + 16}">now</text>
      `;
    }

    function render() {
      const wake = parseClock(els.wakeTime.value) ?? parseClock("06:00");
      const targetNextWake = targetNextWakeFromInput(wake);
      const current = parseClock(currentClockValue());
      const elapsed = elapsedFromWake(wake, current);
      const currentHour = elapsed / 60;
      const endHour = graphEndHour(wake, targetNextWake);
      const endClock = formatClock(wake + endHour * 60);

      els.dayTotal.textContent = targetNextWake
        ? `${formatClock(wake)} wake, graph ends ${endClock}, ${formatClock(targetNextWake)} target next wake`
        : `${formatClock(wake)} wake, graph ends ${endClock}`;

      els.summary.innerHTML = components.map((component) => `
        <div class="metric" style="--metric-color: ${component.color}">
          <span>${component.label}</span>
          <strong>${Math.round(component.value(currentHour))}</strong>
        </div>
      `).join("");

      els.chart.innerHTML = `
        <svg viewBox="0 0 ${chart.width} ${chart.height}" role="img" aria-label="Cognitive and body state component line graph">
          ${renderSleepBand(wake, targetNextWake, endHour)}
          ${renderGrid(wake, endHour)}
          ${components.map((component) => `
            <polyline class="state-line" style="--line-color: ${component.color}" points="${pathFor(component, endHour)}"></polyline>
          `).join("")}
          ${renderNowLine(elapsed, endHour)}
        </svg>
      `;

      els.legend.innerHTML = components.map((component) => `
        <li style="--line-color: ${component.color}">${component.label}</li>
      `).join("");

      els.notes.innerHTML = components.map((component) => `
        <section class="note" style="--line-color: ${component.color}">
          <strong>${component.label}</strong>
          <span>${component.note}</span>
        </section>
      `).join("");
    }

    els.wakeTime.addEventListener("input", render);
    els.nextWakeTime.addEventListener("input", render);

    render();
    window.setInterval(render, 60 * 1000);
  </script>
</body>
</html>
